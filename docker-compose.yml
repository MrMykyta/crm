services:
  frontend:
    build: ./client
    container_name: crm_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  pdf:
    build: ./docker/pdf
    container_name: crm_pdf
    restart: unless-stopped
    expose:
      - "9222"
    shm_size: "512mb"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9222/json/version | grep -q webSocketDebuggerUrl || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 20
      start_period: 2s

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: crm_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      FILES_STORAGE_ROOT: /app
      PUPPETEER_BROWSER_URL: http://pdf:9222
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://146.59.232.254}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,http://localhost:3000,http://127.0.0.1:3000,http://146.59.232.254,http://146.59.232.254:80}
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/uploads-tmp:/app/uploads-tmp
    depends_on:
      pdf:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-app}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-root}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  mongodata:
